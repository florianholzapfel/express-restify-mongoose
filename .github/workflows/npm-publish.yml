name: Publish

on:
  release:
    types: [created]

permissions:
  id-token: write
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        mongodb-version: ["4.4", "5.0", "6.0", "7.0"]
        # Publish gates on Node 24 (active LTS) only.
        node-version: [24.x]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          cache: "yarn"
          node-version: ${{ matrix.node-version }}
      - uses: supercharge/mongodb-github-action@1.6.0
      - run: yarn --frozen-lockfile
      - run: yarn lint
      - run: yarn tsc
      - run: yarn build
      - run: yarn test

  publish:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org/
      - run: npm install -g npm@latest
      - run: yarn --frozen-lockfile
      - run: yarn build
      - run: npm publish
